<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gebetszeiten</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b0b0c" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>

:root{
--bg:#0b0b0c;
--card:#1b1b1e;
--card2:#141416;
--line:#2a2a2e;
--text:#ffffff;
--muted:rgba(255,255,255,.7);
--next:#112941;
--nextLine:#1e4d76;
--current:#1d2b17;
--currentLine:#3b6a2a;
}

*{box-sizing:border-box}

body{
font-family:-apple-system,BlinkMacSystemFont,system-ui,Segoe UI,Roboto,Arial;
margin:0;background:var(--bg);color:var(--text)
}

header{padding:18px 16px 10px}
h1{margin:0;font-size:26px}

.meta{margin-top:10px;display:grid;gap:10px;color:var(--muted);font-size:14px}

.meta .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

.pill{
border:1px solid var(--line);
border-radius:999px;
padding:6px 10px;
background:#0f0f11;color:var(--text);
font-variant-numeric:tabular-nums;
}

.wrap{padding:12px 16px 18px;display:grid;gap:12px}

.card{
background:var(--card2);
border:1px solid var(--line);
border-radius:18px;
padding:14px;
}

.item{
display:flex;
align-items:center;
justify-content:space-between;
padding:14px;
border-radius:18px;
border:1px solid var(--line);
background:var(--card);
}

.item.next{
background:var(--next);
border-color:var(--nextLine);
}

.item.current{
background:var(--current);
border-color:var(--currentLine);
}

.left{display:flex;gap:12px;align-items:flex-start}

.icon{
width:36px;height:36px;border-radius:12px;
display:grid;place-items:center;
background:rgba(255,255,255,.08);
font-size:18px;
}

.txt{display:grid;gap:4px}

.nameRow{display:flex;gap:8px;align-items:center}

.name{font-size:18px;font-weight:800}

.desc{font-size:13px;color:rgba(255,255,255,.72)}

.time{
font-size:22px;
font-weight:900;
font-variant-numeric:tabular-nums;
}

/* Qibla */

.qiblaHeader{display:flex;justify-content:space-between;align-items:center}

.qiblaTitle{font-weight:900;font-size:16px}

.qiblaRow{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-top:12px}

.compassCircle{
width:160px;
height:160px;
border-radius:50%;
border:1px solid var(--line);
background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.08), rgba(255,255,255,0));
position:relative;
}

.compassTick{
position:absolute;
inset:10px;
border-radius:50%;
border:1px dashed rgba(255,255,255,.12);
}

.compassN{
position:absolute;
top:6px;
left:50%;
transform:translateX(-50%);
font-weight:900;
font-size:12px;
}

.compassE{
position:absolute;
right:6px;
top:50%;
transform:translateY(-50%);
font-weight:900;
font-size:12px;
}

.compassS{
position:absolute;
bottom:6px;
left:50%;
transform:translateX(-50%);
font-weight:900;
font-size:12px;
}

.compassW{
position:absolute;
left:6px;
top:50%;
transform:translateY(-50%);
font-weight:900;
font-size:12px;
}

.compassNeedle{
width:4px;
height:70px;
background:#ff3b30;
position:absolute;
bottom:50%;
left:50%;
transform-origin:50% 100%;
transform:translateX(-50%) rotate(0deg);
border-radius:3px;
}

.compassDot{
width:12px;height:12px;border-radius:50%;
background:white;
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
}

.kaaba{
position:absolute;
top:12px;
left:50%;
transform:translateX(-50%);
font-size:20px;
}

.qiblaBtn{
background:#ffffff;
color:#0b0b0c;
border:0;
border-radius:14px;
padding:10px 12px;
font-weight:900;
font-size:14px;
}

</style>
</head>

<body>

<header>

<h1>Gebetszeiten</h1>

<div class="meta">

<div class="row">
<span id="greg">—</span>
<span class="pill" id="hijri">—</span>
</div>

<div class="row">
<span class="pill" id="loc">Kein Ort gewählt</span>
<span class="pill" id="status">Ort auswählen</span>
</div>

<div class="searchWrap">
<input id="cityInput" class="searchInput" placeholder="Ort suchen">
<div id="suggestions" class="suggestions"></div>
</div>

</div>

</header>

<div class="wrap" id="list"></div>

<div class="wrap">

<div class="card">

<div class="qiblaHeader">
<div class="qiblaTitle">Qibla Kompass</div>
<button class="qiblaBtn" id="qiblaEnable">Kompass aktivieren</button>
</div>

<div class="qiblaRow">

<div class="compassCircle">

<div class="compassTick"></div>

<div class="compassN">N</div>
<div class="compassE">O</div>
<div class="compassS">S</div>
<div class="compassW">W</div>

<div class="compassNeedle" id="qiblaNeedle"></div>

<div class="kaaba" id="kaabaIcon">🕋</div>

<div class="compassDot"></div>

</div>

</div>

</div>

</div>

<script>

const KAABA={lat:21.422487,lon:39.826206}

let deviceHeading=null
let qiblaBearing=null

const qiblaNeedleEl=document.getElementById("qiblaNeedle")
const kaabaIcon=document.getElementById("kaabaIcon")

function toRad(d){return d*Math.PI/180}
function toDeg(r){return r*180/Math.PI}

function normalize360(x){
let v=x%360
if(v<0)v+=360
return v
}

function computeBearing(lat1,lon1,lat2,lon2){

const φ1=toRad(lat1)
const φ2=toRad(lat2)
const Δλ=toRad(lon2-lon1)

const y=Math.sin(Δλ)*Math.cos(φ2)
const x=Math.cos(φ1)*Math.sin(φ2)-Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ)

return normalize360(toDeg(Math.atan2(y,x)))

}

function updateNeedle(){

if(!PLACE)return

qiblaBearing=computeBearing(PLACE.lat,PLACE.lon,KAABA.lat,KAABA.lon)

if(deviceHeading===null)return

const rot=normalize360(qiblaBearing-deviceHeading)

qiblaNeedleEl.style.transform=`translateX(-50%) rotate(${rot}deg)`
kaabaIcon.style.transform=`translateX(-50%) rotate(${rot}deg)`

}

function handleOrientation(e){

let heading=null

if(typeof e.webkitCompassHeading==="number"){
heading=e.webkitCompassHeading
}else if(typeof e.alpha==="number"){
heading=360-e.alpha
}

if(heading===null)return

deviceHeading=normalize360(heading)

updateNeedle()

}

async function enableCompass(){

if(typeof DeviceOrientationEvent!=="undefined" && typeof DeviceOrientationEvent.requestPermission==="function"){
const res=await DeviceOrientationEvent.requestPermission()
if(res!=="granted")return
}

window.addEventListener("deviceorientationabsolute",handleOrientation,true)
window.addEventListener("deviceorientation",handleOrientation,true)

}

document.getElementById("qiblaEnable").addEventListener("click",enableCompass)

</script>

</body>
</html>
